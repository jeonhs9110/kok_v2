# Bitbucket Pipelines — KOKKOK Garden CI build.
#
# Mirrors the existing GitHub Actions workflow (.github/workflows/
# build-publish-artifact.yml) but runs in Bitbucket Cloud's Pipelines
# runner. While Phase 4 of the migration is in progress, BOTH this
# pipeline AND the GitHub Actions workflow run in parallel — they
# both push the same Docker image to the same ECR repository with
# the same tags. Whichever finishes first wins on the latest tag;
# the deploy doesn't care which CI built the image.
#
# Required Bitbucket repository variables (Repository settings →
# Pipelines → Repository variables) — set these BEFORE this pipeline
# can run successfully:
#
#   AWS_ACCESS_KEY_ID            (secured) — same value as the GH secret
#   AWS_SECRET_ACCESS_KEY        (secured) — same value as the GH secret
#   NEXT_PUBLIC_SUPABASE_URL     (secured) — same value as the GH secret
#   NEXT_PUBLIC_SUPABASE_ANON_KEY (secured) — same value as the GH secret
#
# Cost note: Pipelines builds use Bitbucket Cloud's free 50 build-min
# allowance first, then $10/mo for 1000 build-min. A full image build
# takes ~3-4 min, so monthly headroom is easily ~12 prod builds even
# at the free tier. We'll switch to the paid plan when traffic +
# deploy cadence demand.

image: atlassian/default-image:4

definitions:
  caches:
    npm: ~/.npm
  services:
    docker:
      memory: 3072

pipelines:
  branches:
    main:
      - step:
          name: Build & push Docker image to ECR
          runs-on:
            - self.hosted
            - linux.arm64
          # If self-hosted ARM runners aren't available in the workspace,
          # we'll need to fall back to Bitbucket Cloud's standard x86_64
          # runner and either cross-build via buildx or accept that the
          # runner-cached image is x86_64 (will be relevant in Phase 5
          # when we move to t3a.small anyway). For now, keep ARM so the
          # image matches the t4g.small in prod.
          services:
            - docker
          caches:
            - npm
            - docker
          script:
            # ──────────────────────────────────────────────────────
            # Install awscli (atlassian/default-image:4 doesn't ship it)
            # ──────────────────────────────────────────────────────
            - pipe: atlassian/aws-cli-run:1.4.0
              variables:
                AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
                AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
                AWS_DEFAULT_REGION: ap-northeast-2
                COMMAND: 'sts get-caller-identity'

            # ──────────────────────────────────────────────────────
            # Authenticate Docker against ECR
            # ──────────────────────────────────────────────────────
            - export ECR_REGISTRY=431412300241.dkr.ecr.ap-northeast-2.amazonaws.com
            - export AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
            - export AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
            - export AWS_DEFAULT_REGION=ap-northeast-2
            - aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin $ECR_REGISTRY

            # ──────────────────────────────────────────────────────
            # Build the image (same Dockerfile as GH Actions uses)
            # ──────────────────────────────────────────────────────
            - export SHA_SHORT=${BITBUCKET_COMMIT:0:7}
            - export IMAGE_NAME=$ECR_REGISTRY/kokkok-app
            - >
              docker build
              --build-arg NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
              --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
              -t $IMAGE_NAME:master-$SHA_SHORT
              -t $IMAGE_NAME:latest
              -f Dockerfile
              .

            # ──────────────────────────────────────────────────────
            # Push both tags to ECR
            # ──────────────────────────────────────────────────────
            - docker push $IMAGE_NAME:master-$SHA_SHORT
            - docker push $IMAGE_NAME:latest

            - echo "✓ Pushed $IMAGE_NAME:master-$SHA_SHORT"
            - echo "✓ Pushed $IMAGE_NAME:latest"

# Manual trigger only on non-main branches — saves build-minutes by not
# running every feature branch through the full image build.
  pull-requests:
    '**':
      - step:
          name: Typecheck & lint
          image: node:22-alpine
          caches:
            - npm
          script:
            - apk add --no-cache libc6-compat
            - npm ci --no-audit --no-fund
            - npx tsc --noEmit
            - npx eslint .
