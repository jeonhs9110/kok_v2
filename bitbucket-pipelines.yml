# Bitbucket Pipelines — KOKKOK Garden CI build.
#
# On every push to `main`, builds the Next.js standalone Docker image and
# pushes it to ECR with two tags: `master-<sha>` (immutable per-commit
# anchor) and `latest` (rolling pointer for deploys). ECR was flipped to
# MUTABLE on 2026-06-29 so re-pushing :latest no longer 409s.
#
# Required Bitbucket repository variables (Repository settings →
# Pipelines → Repository variables):
#
#   AWS_ACCESS_KEY_ID            (secured)
#   AWS_SECRET_ACCESS_KEY        (secured)
#   NEXT_PUBLIC_SUPABASE_URL     (secured)
#   NEXT_PUBLIC_SUPABASE_ANON_KEY (secured)
#
# Why this is simpler than the prior version:
#   - The prior YAML failed Bitbucket schema validation with the cryptic
#     "Configuration error — No matching pipeline definition" at 0s
#     duration. Root cause: `definitions.services.docker.memory: 3072`
#     was the absolute max for a 1x step (4GB total - 1GB build reserve);
#     Bitbucket's validator rejects configs that leave zero headroom.
#   - The prior YAML also used `caches: [..., docker]`, which only works
#     in combination with a customized docker service. Dropping the memory
#     override leaves the docker cache reference orphaned, so it goes too.
#   - The `pipe: atlassian/aws-cli-run:1.4.0` step was used to install
#     awscli, but atlassian/default-image:4 already ships it — the pipe
#     was overhead, not a dependency.
#
# Cost: Pipelines builds use Bitbucket Cloud's free 50 build-min/mo
# allowance first, then $10/mo for 1000 build-min. A full image build
# takes ~3-4 min on the default 1x step size.

image: atlassian/default-image:4

definitions:
  caches:
    npm: ~/.npm

pipelines:
  branches:
    main:
      - step:
          name: Build & push Docker image to ECR
          services:
            - docker
          caches:
            - npm
          script:
            - export ECR_REGISTRY=431412300241.dkr.ecr.ap-northeast-2.amazonaws.com
            - export IMAGE_NAME=$ECR_REGISTRY/kokkok-app
            - export SHA_SHORT=${BITBUCKET_COMMIT:0:7}
            - export AWS_DEFAULT_REGION=ap-northeast-2

            # Sanity check — fails fast if repo variables are missing.
            - aws sts get-caller-identity

            # Authenticate Docker against ECR.
            - aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin $ECR_REGISTRY

            # Build the image with both per-SHA + rolling tags.
            - >
              docker build
              --build-arg NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
              --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
              -t $IMAGE_NAME:master-$SHA_SHORT
              -t $IMAGE_NAME:latest
              -f Dockerfile
              .

            # Push. master-<sha> is the canonical archive; latest is the
            # rolling pointer the deploy reads.
            - docker push $IMAGE_NAME:master-$SHA_SHORT
            - docker push $IMAGE_NAME:latest

            - echo "✓ Pushed $IMAGE_NAME:master-$SHA_SHORT"
            - echo "✓ Pushed $IMAGE_NAME:latest"

  pull-requests:
    '**':
      - step:
          name: Typecheck & lint
          image: node:22-alpine
          caches:
            - npm
          script:
            - apk add --no-cache libc6-compat
            - npm ci --no-audit --no-fund
            - npx tsc --noEmit
            - npx eslint .
