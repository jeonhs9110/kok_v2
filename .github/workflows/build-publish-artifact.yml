name: Build & Publish Next.js Artifact

# Phase 2 deploy pipeline: GitHub Actions builds the Next.js standalone
# bundle, tars it, and uploads to s3://kokkok-deploy-artifacts/latest.tar.gz.
# EC2 user-data then just curls + extracts it on boot (no npm install,
# no build) — boot-to-healthy goes from ~5min to ~90s.

on:
  workflow_dispatch: {}
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/build-publish-artifact.yml'

permissions:
  contents: read

concurrency:
  group: build-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET: kokkok-deploy-artifacts

jobs:
  build:
    # ARM64 runner so sharp's postinstall pulls the linux-arm64 binary that
    # matches the t4g.small EC2 (Graviton, aarch64). Previously this ran on
    # ubuntu-latest (x86_64), so the standalone bundle shipped sharp-linux-x64
    # to an ARM host — next/image fell back to its WASM resizer and pegged
    # both vCPUs on every product grid render.
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'   # ~/.npm cache cuts `npm ci` from ~90s to ~20s on warm cache

      - name: Install deps
        # Dropped --ignore-scripts: sharp's postinstall is what selects the
        # right platform binary (linux-arm64 / linux-x64 / musl / etc.).
        # With scripts blocked, npm resolved the metapackage but never
        # downloaded the actual native binary, forcing the WASM fallback.
        run: npm ci --no-audit --no-fund

      - name: Build Next.js (standalone)
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: '1'
          # 2026-06-30: NEXT_PUBLIC_SUPABASE_URL / *_ANON_KEY were removed
          # from this env block when Supabase was cut. The browser client
          # (src/lib/supabase/browser.ts) falls back to a placeholder when
          # those vars are absent at build time — bundle stays valid; the
          # legacy createBrowserClient instance is unreachable in prod
          # because every call site dispatches on USE_*_FROM_BROWSER first.
          # Media storage cutover — Supabase Storage → S3 + CloudFront.
          # The bucket name and CDN URL are NOT secrets (the bucket is
          # private at S3, public via CloudFront with this URL prefix),
          # so they live as plain values rather than repo secrets.
          NEXT_PUBLIC_S3_STORAGE_BUCKET: kokkok-media
          NEXT_PUBLIC_S3_PUBLIC_CDN_URL: https://www.kokkokgarden.com/media
          NEXT_PUBLIC_USE_S3: 'true'
          # Auth cutover — Supabase Auth → Cognito. Pool + client IDs are
          # NOT secrets (cognito pool IDs identify the pool but require
          # valid AWS creds OR a valid signed JWT to do anything). Inlined
          # here so admin operators don't have to maintain repo secrets.
          NEXT_PUBLIC_USE_COGNITO: 'true'
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ap-northeast-2_dTjn9KBWW
          NEXT_PUBLIC_COGNITO_CLIENT_ID: 2vvthi7mr3mtti62tlmch01nfu
          # Admin browser-side dispatcher. Activates the
          # USE_RDS_FROM_BROWSER branches in /admin/products,
          # /admin/categories, /admin/carousel, etc. (12 hooks total
          # already wired). Must be inlined at build time — server-side
          # USE_RDS=true on EC2 covers the server path.
          NEXT_PUBLIC_USE_RDS: 'true'
        run: npm run build

      - name: Package artifact
        run: |
          # next.config.ts is configured with `output: 'standalone'`, which
          # produces a self-contained server.js + minimal node_modules in
          # .next/standalone. We layer .next/static and public/ back on top
          # since Next's standalone copy intentionally omits them.
          set -euxo pipefail
          mkdir -p deploy
          cp -r .next/standalone/. deploy/
          mkdir -p deploy/.next
          cp -r .next/static deploy/.next/static
          if [ -d public ]; then cp -r public deploy/public; fi

          tar -czf app.tar.gz -C deploy .
          SIZE=$(du -h app.tar.gz | cut -f1)
          echo "Artifact size: $SIZE"
          echo "ARTIFACT_SIZE=$SIZE" >> "$GITHUB_ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Long-lived keys for now — switch to OIDC role
          # `github-actions-deploy` once 권대영 provisions it.
          # See [[pending-email-to-daeyoung-iam-for-phase2]].
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload artifact to S3
        run: |
          set -euxo pipefail
          SHA_SHORT=${GITHUB_SHA::7}

          # Versioned history (kept 30 days via bucket lifecycle).
          aws s3 cp app.tar.gz "s3://${S3_BUCKET}/builds/master-${SHA_SHORT}.tar.gz" \
            --no-progress

          # Atomic "what's currently live" pointer that EC2 boots fetch.
          aws s3 cp app.tar.gz "s3://${S3_BUCKET}/latest.tar.gz" \
            --no-progress \
            --metadata "commit=${GITHUB_SHA},built=$(date -Iseconds)"

          echo "✓ Published: s3://${S3_BUCKET}/latest.tar.gz (commit ${SHA_SHORT}, ${ARTIFACT_SIZE})"

      # ──────────────────────────────────────────────────────────────
      # Trigger the EC2 deploy refresh.
      #
      # Without this step every fix that lands on master sits in S3
      # forever while the running instance keeps serving the bundle it
      # pulled at boot time. Pre-2026-06-30 the prod EC2 had been
      # running stale code for 22h across 7+ merged PRs — invisible to
      # operators because GHA went green and CloudWatch showed no
      # errors. The actual `aws s3 cp` above succeeded; nothing on the
      # box ever fetched the new tarball.
      #
      # Looking up the instance by Name tag (not hard-coded ID) so the
      # workflow keeps working after Terraform replaces the instance.
      # /usr/local/bin/kokkok-refresh.sh (installed via ec2.tf
      # user_data + checked into infrastructure/scripts) handles the
      # atomic swap + health-check rollback.
      # ──────────────────────────────────────────────────────────────
      - name: Trigger EC2 deploy refresh
        run: |
          set -euxo pipefail
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=kokkok-app-*" "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text | head -n1)
          if [ -z "$INSTANCE_ID" ]; then
            echo "::warning::No running kokkok-app-* EC2 instance found — skipping refresh trigger"
            exit 0
          fi
          echo "Triggering deploy refresh on $INSTANCE_ID..."
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "GHA build-publish-artifact for commit ${GITHUB_SHA::7}" \
            --parameters 'commands=["sudo /usr/local/bin/kokkok-refresh.sh"]' \
            --query "Command.CommandId" \
            --output text)
          echo "SSM command: $CMD_ID"

          # Wait for completion. The refresh script runs ~10-30s
          # including the health-check retry loop. Surfacing the exit
          # status here means a bad deploy turns the GHA run red
          # instead of silently leaving prod broken.
          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query Status --output text)
          echo "Refresh status: $STATUS"

          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --query StandardOutputContent --output text || true

          if [ "$STATUS" != "Success" ]; then
            echo "::error::Deploy refresh failed with status=$STATUS"
            aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --query StandardErrorContent --output text || true
            exit 1
          fi

      # ──────────────────────────────────────────────────────────────
      # Phase 1 of the GitHub → Bitbucket migration: ALSO build a
      # Docker image and push to ECR. The tarball path above keeps
      # working for the live EC2 deploy — Phase 4 switches the EC2
      # user_data to docker run, at which point we delete the tarball
      # steps. For now both run in parallel so the docker image is
      # validated against real CI without touching prod.
      # ──────────────────────────────────────────────────────────────

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - name: Build & push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          # arm64 only for now (matches t4g.small). Phase 5 swap to
          # t3a.small flips this to linux/amd64 — single-line change.
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/kokkok-app:master-${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/kokkok-app:latest
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "### Artifact + Image published"
            echo "- **commit**: \`${GITHUB_SHA::7}\`"
            echo "- **tarball size**: ${ARTIFACT_SIZE}"
            echo "- **tarball**: \`s3://${S3_BUCKET}/latest.tar.gz\`"
            echo "- **image**: \`${{ steps.ecr-login.outputs.registry }}/kokkok-app:master-${GITHUB_SHA::7}\`"
            echo ""
            echo "**Deploy:** auto-triggered via SSM \`kokkok-refresh.sh\` immediately after S3 upload."
            echo "(Pre-2026-06-30 this required \`terraform apply -replace=aws_instance.app\` manually.)"
            echo "Phase 4 will flip EC2 to pull the docker image instead."
          } >> "$GITHUB_STEP_SUMMARY"
