name: PR checks

# Runs on every PR opened against master. Blocks merge if tsc, lint, or
# next build regress. Added 2026-06-21 — before this, the only CI was
# the build-publish-artifact workflow that fires post-merge.

on:
  pull_request:
    branches: [master]

jobs:
  typecheck-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: tsc --noEmit
        run: npx tsc --noEmit

      - name: ESLint
        # Allow the single pre-existing custom-font warning to remain; fail
        # on anything new. Tighten to --max-warnings=0 once that's fixed.
        run: npm run lint -- --max-warnings=1

      # PR #223 shipped a build-breaking import (geoip-country reads its
      # own package.json — Turbopack's standalone bundler didn't preserve
      # it). tsc + lint both passed because the failure only surfaces in
      # `next build`'s "Collecting page data" phase. Run a full build in
      # PR checks so we catch this class of bug pre-merge instead of
      # discovering it from a red Build & Publish run after master is
      # already at the broken SHA.
      - name: next build (catch bundler/runtime issues)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_TELEMETRY_DISABLED: '1'
        # `npm run build` (not `npx next build`) so the --webpack flag
        # pinned in package.json applies. Turbopack doesn't honor the
        # webpack resolve.fallback in next.config.ts that keeps pg's
        # Node-only deps (tls, util/types) out of the client bundle.
        run: npm run build
