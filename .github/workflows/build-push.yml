name: build & push image to ECR

on:
  workflow_dispatch: {}
  push:
    branches: [master, feat/aws-deploy]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.ts'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/build-push.yml'

permissions:
  contents: read

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 431412300241.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: kokkok/app

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ecr login
        uses: aws-actions/amazon-ecr-login@v2

      - name: set up buildx
        uses: docker/setup-buildx-action@v3

      - name: build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: image summary
        run: |
          echo "### pushed: kokkok/app" >> $GITHUB_STEP_SUMMARY
          echo "- tag: latest" >> $GITHUB_STEP_SUMMARY
          echo "- tag: sha-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
